<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>5 in a Row</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#0f172a;
    color:white;
}

h1{
    margin-top:10px;
}

#board{
    display:grid;
    grid-template-columns:repeat(15,24px);
    grid-template-rows:repeat(15,24px);
    gap:2px;
    justify-content:center;
    margin:20px auto;
}

.cell{
    width:24px;
    height:24px;
    background:#1e293b;
    border-radius:4px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    cursor:pointer;
}

.cell:hover{
    background:#334155;
}

button{
    padding:8px 16px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    font-size:14px;
}
</style>
</head>

<body>

<h1>5 in a Row</h1>
<p id="status">Player X turn</p>

<div id="board"></div>

<button onclick="restartGame()">Restart</button>

<script>

const tg = window.Telegram.WebApp
tg.expand()

const size = 15
let board = []
let player = "X"
let gameOver = false

const boardDiv = document.getElementById("board")
const statusText = document.getElementById("status")

function createBoard(){

    boardDiv.innerHTML = ""
    board = []

    for(let y=0;y<size;y++){

        board[y] = []

        for(let x=0;x<size;x++){

            board[y][x] = ""

            const cell = document.createElement("div")
            cell.className = "cell"

            cell.dataset.x = x
            cell.dataset.y = y

            cell.onclick = clickCell

            boardDiv.appendChild(cell)
        }
    }
}

function clickCell(){

    if(gameOver) return

    const x = this.dataset.x
    const y = this.dataset.y

    if(board[y][x] !== "") return

    board[y][x] = player
    this.innerText = player

    if(checkWin(x,y)){
        statusText.innerText = "Player " + player + " wins!"
        tg.HapticFeedback.notificationOccurred("success")
        gameOver = true
        return
    }

    player = player === "X" ? "O" : "X"
    statusText.innerText = "Player " + player + " turn"
}

function checkDirection(x,y,dx,dy){

    let count = 1

    for(let i=1;i<5;i++){
        let nx = Number(x)+dx*i
        let ny = Number(y)+dy*i
        if(board[ny]?.[nx]===player) count++
        else break
    }

    for(let i=1;i<5;i++){
        let nx = Number(x)-dx*i
        let ny = Number(y)-dy*i
        if(board[ny]?.[nx]===player) count++
        else break
    }

    return count>=5
}

function checkWin(x,y){
    return(
        checkDirection(x,y,1,0) ||
        checkDirection(x,y,0,1) ||
        checkDirection(x,y,1,1) ||
        checkDirection(x,y,1,-1)
    )
}

function restartGame(){
    player="X"
    gameOver=false
    statusText.innerText="Player X turn"
    createBoard()
}

createBoard()

</script>

</body>
</html>
