<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>5 in a Row</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
}

#board{
    display:grid;
    grid-template-columns:repeat(15,35px);
    grid-template-rows:repeat(15,35px);
    gap:2px;
    justify-content:center;
    margin:20px auto;
}

.cell{
    width:35px;
    height:35px;
    background:white;
    border:1px solid #ccc;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    cursor:pointer;
}

.cell:hover{
    background:#eee;
}

button{
    padding:10px 20px;
    font-size:16px;
}
</style>
</head>

<body>

<h1>5 in a Row</h1>
<p id="status">Player X turn</p>

<div id="board"></div>

<button onclick="restartGame()">Restart</button>

<script>

const boardSize = 15
let board = []
let currentPlayer = "X"
let gameOver = false

const boardDiv = document.getElementById("board")
const statusText = document.getElementById("status")

function createBoard(){
    boardDiv.innerHTML = ""
    board = []

    for(let y=0;y<boardSize;y++){
        board[y] = []

        for(let x=0;x<boardSize;x++){
            board[y][x] = ""

            const cell = document.createElement("div")
            cell.classList.add("cell")

            cell.dataset.x = x
            cell.dataset.y = y

            cell.onclick = cellClick

            boardDiv.appendChild(cell)
        }
    }
}

function cellClick(){

    if(gameOver) return

    const x = this.dataset.x
    const y = this.dataset.y

    if(board[y][x] !== "") return

    board[y][x] = currentPlayer
    this.textContent = currentPlayer

    if(checkWin(x,y)){
        statusText.textContent = "Player " + currentPlayer + " wins!"
        gameOver = true
        return
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X"
    statusText.textContent = "Player " + currentPlayer + " turn"
}

function checkDirection(x,y,dx,dy){

    let count = 1

    for(let i=1;i<5;i++){
        let nx = Number(x) + dx*i
        let ny = Number(y) + dy*i
        if(board[ny]?.[nx] === currentPlayer) count++
        else break
    }

    for(let i=1;i<5;i++){
        let nx = Number(x) - dx*i
        let ny = Number(y) - dy*i
        if(board[ny]?.[nx] === currentPlayer) count++
        else break
    }

    return count >= 5
}

function checkWin(x,y){
    return (
        checkDirection(x,y,1,0) ||
        checkDirection(x,y,0,1) ||
        checkDirection(x,y,1,1) ||
        checkDirection(x,y,1,-1)
    )
}

function restartGame(){
    currentPlayer = "X"
    gameOver = false
    statusText.textContent = "Player X turn"
    createBoard()
}

createBoard()

</script>

</body>
</html>
